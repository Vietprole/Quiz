<!doctype html>
<html lang="vi" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trò Chơi Luyện Từ Và Câu Lớp 3</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Quicksand', sans-serif; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
      50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.8); }
    }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100px) rotate(720deg); opacity: 0; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes slide-up {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    
    .float-animation { animation: float 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .confetti { animation: confetti 1s ease-out forwards; }
    .shake { animation: shake 0.5s ease-in-out; }
    .bounce-in { animation: bounce-in 0.5s ease-out forwards; }
    .slide-up { animation: slide-up 0.4s ease-out forwards; }
    
    .star-bg {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #1e3a5f 100%);
    }
    
    .option-btn {
      transition: all 0.3s ease;
      background: linear-gradient(145deg, #ffffff, #f0f0f0);
    }
    
    .option-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    
    .correct-answer {
      background: linear-gradient(145deg, #86efac, #4ade80) !important;
      border-color: #22c55e !important;
    }
    
    .wrong-answer {
      background: linear-gradient(145deg, #fca5a5, #f87171) !important;
      border-color: #ef4444 !important;
    }
    
    .progress-fill {
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      transition: width 0.5s ease;
    }
    
    .card-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app" class="min-h-full star-bg p-4 relative overflow-hidden"><!-- Decorative elements -->
   <div class="absolute top-10 left-10 text-6xl float-animation opacity-60">
    ⭐
   </div>
   <div class="absolute top-20 right-16 text-4xl float-animation opacity-60" style="animation-delay: 0.5s;">
    🌟
   </div>
   <div class="absolute bottom-20 left-20 text-5xl float-animation opacity-60" style="animation-delay: 1s;">
    📚
   </div>
   <div class="absolute bottom-32 right-10 text-4xl float-animation opacity-60" style="animation-delay: 1.5s;">
    ✏️
   </div><!-- Start Screen -->
   <div id="start-screen" class="flex flex-col items-center justify-center min-h-full py-8">
    <div class="card-container rounded-3xl p-8 md:p-12 max-w-2xl mx-auto text-center shadow-2xl">
     <div class="text-7xl mb-6 bounce-in">
      🏫
     </div>
     <h1 id="game-title" class="text-3xl md:text-4xl font-bold text-blue-800 mb-4">Cổng Trường Rộng Mở</h1>
     <p id="welcome-msg" class="text-lg text-gray-600 mb-2">Luyện từ và câu - Lớp 3</p>
     <p class="text-gray-500 mb-8">Kết nối tri thức với cuộc sống</p>
     <div class="bg-gradient-to-r from-amber-100 to-orange-100 rounded-2xl p-6 mb-8">
      <div class="flex items-center justify-center gap-3 mb-3"><span class="text-3xl">🎯</span> <span class="text-xl font-semibold text-amber-800">15 câu hỏi thử thách</span>
      </div>
      <p class="text-amber-700">Trả lời đúng để thu thập ngôi sao!</p>
     </div><button onclick="startGame()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white text-xl font-bold py-4 px-12 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300 pulse-glow"> 🚀 Bắt đầu chơi </button>
    </div>
   </div><!-- Game Screen -->
   <div id="game-screen" class="hidden min-h-full py-4">
    <div class="max-w-3xl mx-auto"><!-- Header -->
     <div class="flex justify-between items-center mb-4 px-2">
      <div class="flex items-center gap-2 bg-white/90 rounded-full px-4 py-2 shadow-lg"><span class="text-2xl">⭐</span> <span id="score" class="text-xl font-bold text-amber-600">0</span>
      </div>
      <div class="bg-white/90 rounded-full px-4 py-2 shadow-lg"><span class="text-lg font-semibold text-blue-800">Câu <span id="current-q">1</span>/15</span>
      </div>
     </div><!-- Progress Bar -->
     <div class="bg-white/30 rounded-full h-4 mb-6 mx-2 overflow-hidden">
      <div id="progress-bar" class="progress-fill h-full rounded-full" style="width: 0%"></div>
     </div><!-- Question Card -->
     <div class="card-container rounded-3xl p-6 md:p-8 shadow-2xl mx-2">
      <div class="flex items-start gap-4 mb-6">
       <div class="text-4xl flex-shrink-0">
        ❓
       </div>
       <h2 id="question-text" class="text-xl md:text-2xl font-semibold text-gray-800 leading-relaxed"></h2>
      </div>
      <div id="options-container" class="grid gap-3"><!-- Options will be inserted here -->
      </div><!-- Feedback -->
      <div id="feedback" class="hidden mt-6 p-4 rounded-2xl text-center"><span id="feedback-icon" class="text-4xl block mb-2"></span>
       <p id="feedback-text" class="text-lg font-semibold"></p>
      </div><!-- Next Button --> <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-6 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white text-lg font-bold py-4 rounded-2xl shadow-lg transform hover:scale-[1.02] transition-all duration-300"> Câu tiếp theo ➡️ </button>
     </div>
    </div>
   </div><!-- Result Screen -->
   <div id="result-screen" class="hidden flex flex-col items-center justify-center min-h-full py-8">
    <div class="card-container rounded-3xl p-8 md:p-12 max-w-2xl mx-auto text-center shadow-2xl">
     <div id="result-icon" class="text-8xl mb-6 bounce-in"></div>
     <h2 id="result-title" class="text-3xl md:text-4xl font-bold mb-4"></h2>
     <p id="result-message" class="text-xl text-gray-600 mb-6"></p>
     <div class="bg-gradient-to-r from-amber-100 to-orange-100 rounded-2xl p-6 mb-8">
      <div class="text-5xl mb-2">
       ⭐
      </div>
      <p class="text-2xl font-bold text-amber-800">Điểm số: <span id="final-score">0</span>/15</p>
     </div>
     <div class="flex flex-col sm:flex-row gap-4 justify-center"><button onclick="restartGame()" class="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white text-lg font-bold py-4 px-8 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300"> 🔄 Chơi lại </button> <button onclick="goHome()" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white text-lg font-bold py-4 px-8 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300"> 🏠 Về trang chủ </button>
     </div>
    </div>
   </div><!-- Confetti Container -->
   <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50"></div>
  </div>
  <script>
    const defaultConfig = {
      game_title: "Cổng Trường Rộng Mở",
      welcome_message: "Luyện từ và câu - Lớp 3"
    };

    const questions = [
      {
        question: "Từ nào dưới đây chỉ đồ dùng học tập?",
        options: ["Bàn ghế", "Cặp sách", "Cây bàng", "Con chim"],
        correct: 1
      },
      {
        question: "Câu \"Em đến trường học bài.\" thuộc kiểu câu gì?",
        options: ["Câu hỏi", "Câu kể", "Câu cảm", "Câu khiến"],
        correct: 1
      },
      {
        question: "Từ \"rộn ràng\" trong câu \"Sân trường rộn ràng tiếng cười\" là từ loại gì?",
        options: ["Danh từ", "Động từ", "Tính từ", "Đại từ"],
        correct: 2
      },
      {
        question: "Điền từ thích hợp: \"Cổng trường ... mở chào đón học sinh.\"",
        options: ["đóng", "rộng", "hẹp", "cao"],
        correct: 1
      },
      {
        question: "Từ nào sau đây chỉ hoạt động?",
        options: ["Học sinh", "Chạy nhảy", "Sách vở", "Xinh đẹp"],
        correct: 1
      },
      {
        question: "Câu nào sau đây là câu hỏi?",
        options: ["Em đi học.", "Hôm nay trời đẹp quá!", "Bạn tên là gì?", "Hãy học bài đi!"],
        correct: 2
      },
      {
        question: "Từ \"thầy giáo\" thuộc từ loại gì?",
        options: ["Động từ", "Tính từ", "Danh từ", "Trạng từ"],
        correct: 2
      },
      {
        question: "Chọn từ đúng điền vào chỗ trống: \"Mùa thu, lá ... rụng đầy sân trường.\"",
        options: ["xanh", "vàng", "đỏ", "tím"],
        correct: 1
      },
      {
        question: "Từ nào dưới đây là từ chỉ đặc điểm?",
        options: ["Chăm chỉ", "Học tập", "Bạn bè", "Trường học"],
        correct: 0
      },
      {
        question: "Câu \"Trường em đẹp quá!\" bộc lộ cảm xúc gì?",
        options: ["Buồn bã", "Ngạc nhiên, thích thú", "Tức giận", "Sợ hãi"],
        correct: 1
      },
      {
        question: "Từ ghép nào sau đây chỉ người?",
        options: ["Sách vở", "Bàn ghế", "Học sinh", "Hoa lá"],
        correct: 2
      },
      {
        question: "Dấu câu nào đặt cuối câu hỏi?",
        options: ["Dấu chấm (.)", "Dấu chấm hỏi (?)", "Dấu chấm than (!)", "Dấu phẩy (,)"],
        correct: 1
      },
      {
        question: "Từ \"vui vẻ\" trong câu \"Các bạn vui vẻ đến trường\" là từ loại gì?",
        options: ["Danh từ", "Động từ", "Tính từ", "Giới từ"],
        correct: 2
      },
      {
        question: "Câu khiến thường có từ nào?",
        options: ["Ai, gì, nào", "Hãy, đừng, chớ", "Ôi, chao, trời ơi", "Và, với, cùng"],
        correct: 1
      },
      {
        question: "Từ nào sau đây chỉ nơi chốn?",
        options: ["Học giỏi", "Sân trường", "Đọc sách", "Ngoan ngoãn"],
        correct: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function startGame() {
      currentQuestion = 0;
      score = 0;
      answered = false;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('result-screen').classList.add('hidden');
      updateScore();
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('question-text').textContent = q.question;
      document.getElementById('current-q').textContent = currentQuestion + 1;
      document.getElementById('progress-bar').style.width = ((currentQuestion) / 15 * 100) + '%';
      
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';
      
      q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 font-medium text-gray-700 hover:border-blue-400 hover:bg-blue-50 slide-up';
        btn.style.animationDelay = (index * 0.1) + 's';
        btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-full bg-blue-100 text-blue-600 text-center leading-8 mr-3 font-bold">${String.fromCharCode(65 + index)}</span>${option}`;
        btn.onclick = () => selectAnswer(index);
        optionsContainer.appendChild(btn);
      });
      
      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');
      answered = false;
    }

    function selectAnswer(index) {
      if (answered) return;
      answered = true;
      
      const q = questions[currentQuestion];
      const options = document.querySelectorAll('.option-btn');
      
      options.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) {
          btn.classList.add('correct-answer');
        } else if (i === index && index !== q.correct) {
          btn.classList.add('wrong-answer');
          btn.classList.add('shake');
        }
      });
      
      const feedback = document.getElementById('feedback');
      const feedbackIcon = document.getElementById('feedback-icon');
      const feedbackText = document.getElementById('feedback-text');
      
      if (index === q.correct) {
        score++;
        updateScore();
        feedback.className = 'mt-6 p-4 rounded-2xl text-center bg-green-100 bounce-in';
        feedbackIcon.textContent = '🎉';
        feedbackText.textContent = 'Tuyệt vời! Đáp án chính xác!';
        feedbackText.className = 'text-lg font-semibold text-green-700';
        createConfetti();
      } else {
        feedback.className = 'mt-6 p-4 rounded-2xl text-center bg-red-100 bounce-in';
        feedbackIcon.textContent = '😢';
        feedbackText.textContent = `Tiếc quá! Đáp án đúng là: ${q.options[q.correct]}`;
        feedbackText.className = 'text-lg font-semibold text-red-700';
      }
      
      feedback.classList.remove('hidden');
      
      const nextBtn = document.getElementById('next-btn');
      nextBtn.classList.remove('hidden');
      nextBtn.textContent = currentQuestion < 14 ? 'Câu tiếp theo ➡️' : 'Xem kết quả 🏆';
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < 15) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function updateScore() {
      document.getElementById('score').textContent = score;
    }

    function showResult() {
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      
      const resultIcon = document.getElementById('result-icon');
      const resultTitle = document.getElementById('result-title');
      const resultMessage = document.getElementById('result-message');
      document.getElementById('final-score').textContent = score;
      
      if (score >= 13) {
        resultIcon.textContent = '🏆';
        resultTitle.textContent = 'Xuất sắc!';
        resultTitle.className = 'text-3xl md:text-4xl font-bold mb-4 text-amber-600';
        resultMessage.textContent = 'Em là ngôi sao sáng nhất lớp!';
        createConfetti();
        createConfetti();
      } else if (score >= 10) {
        resultIcon.textContent = '🌟';
        resultTitle.textContent = 'Giỏi lắm!';
        resultTitle.className = 'text-3xl md:text-4xl font-bold mb-4 text-green-600';
        resultMessage.textContent = 'Em đã làm rất tốt!';
        createConfetti();
      } else if (score >= 7) {
        resultIcon.textContent = '👍';
        resultTitle.textContent = 'Khá tốt!';
        resultTitle.className = 'text-3xl md:text-4xl font-bold mb-4 text-blue-600';
        resultMessage.textContent = 'Cố gắng thêm nữa em nhé!';
      } else {
        resultIcon.textContent = '💪';
        resultTitle.textContent = 'Cố gắng lên!';
        resultTitle.className = 'text-3xl md:text-4xl font-bold mb-4 text-purple-600';
        resultMessage.textContent = 'Hãy ôn tập và thử lại nhé!';
      }
    }

    function restartGame() {
      startGame();
    }

    function goHome() {
      document.getElementById('start-screen').classList.remove('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.add('hidden');
    }

    function createConfetti() {
      const container = document.getElementById('confetti-container');
      const colors = ['#fbbf24', '#f59e0b', '#ef4444', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899'];
      const emojis = ['⭐', '🌟', '✨', '🎉', '🎊'];
      
      for (let i = 0; i < 20; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti absolute text-2xl';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.top = '-20px';
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        container.appendChild(confetti);
        
        setTimeout(() => confetti.remove(), 1500);
      }
    }

    // Element SDK Integration
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const title = config.game_title || defaultConfig.game_title;
          const welcome = config.welcome_message || defaultConfig.welcome_message;
          
          document.getElementById('game-title').textContent = title;
          document.getElementById('welcome-msg').textContent = welcome;
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["game_title", config.game_title || defaultConfig.game_title],
          ["welcome_message", config.welcome_message || defaultConfig.welcome_message]
        ])
      });
    }
  </script>
